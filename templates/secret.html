<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <script>
        let input = '';
        const secret = 'tpsgmlepdl';
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (input === secret) {
                    window.location.href = '/login';
                }
                input = '';
            } else if (e.key.length === 1) {
                input += e.key;
            }
        });
    </script>
</body>
</html>
